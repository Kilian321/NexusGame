name: NexusGame CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1 : Tests unitaires ────────────────────────────────────────────────
  unit-tests:
    name: Tests unitaires
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          pip install flask pytest pytest-html pytest-cov

      - name: Lancer les tests unitaires
        run: |
          mkdir -p reports
          pytest tests/test_unit.py -v \
            --cov=app_gamestore \
            --cov-report=html:reports/coverage \
            --html=reports/unit_report.html \
            --self-contained-html
          echo "TODO : compléter cette étape"

      - name: Uploader les rapports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-reports
          path: |
            reports/coverage/
            reports/unit.html

  # ── Job 2 : Tests d'intégration ───────────────────────────────────────────
  integration-tests:
    name: Tests d'intégration
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          pip install flask pytest pytest-html requests

      - name: Lancer les tests d'intégration
        run: |
          pytest tests/test_integration.py -v -m integration
          echo "TODO : compléter cette étape"

  # ── Job 3 : Tests Newman ───────────────────────────────────────────────────
  api-tests:
    name: Tests API Newman
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Démarrer l'API GameStore
        run: |
          pip install flask
          python app_gamestore.py &
          sleep 5
          curl --retry 5 --retry-delay 1 http://localhost:5000/health
          echo "TODO : démarrer l'API"

      - name: Lancer Newman
        run: |
          mkdir -p reports
          newman run tests/gamestore_collection.json \
            --env-var "base_url=http://localhost:5000" \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export reports/newman_report.html
          echo "TODO : compléter cette étape"

  # ── Job 4 : Tests UI Playwright ────────────────────────────────────────────
  ui-tests:
    name: Tests UI Playwright
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          pip install flask playwright pytest-playwright pytest-html
          playwright install chromium --with-deps

      - name: Démarrer l'API GameStore
        run: |
          pip install flask
          python app_gamestore.py &
          sleep 2
          curl --retry 5 --retry-delay 1 http://localhost:5000/health

      - name: Lancer les tests UI
        run: |
          mkdir -p reports screenshots
          pytest tests/test_ui.py -v \
          --html=reports/playwright_report.html \
          --self-contained-html

      - name: Uploader screenshots et rapport
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-reports
          path: |
            reports/playwright_report.html
            screenshots/
